<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>International School Teaching Assistant Recruitment System</title>
    <style>
        /* -----------------------
           Global reset
        ----------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* -----------------------
           Page background: white-gray gradient
        ----------------------- */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #f7f7f7, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* -----------------------
           Login container style
        ----------------------- */
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            width: 400px;
            text-align: center;
        }

        /* -----------------------
           Welcome message
        ----------------------- */
        .welcome {
            font-size: 24px;
            margin-bottom: 30px;
            color: #333;
        }

        /* -----------------------
           Form group style
        ----------------------- */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        /* Placeholder color */
        input::placeholder {
            color: #999; /* Light gray */
            font-style: italic; /* optional */
        }

        /* -----------------------
           Login button
        ----------------------- */
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #0055aa;
        }

        /* -----------------------
           Contact admin link
        ----------------------- */
        .contact-admin {
            text-align: right;
            margin-top: 15px;
            font-size: 14px;
        }

        .contact-admin a {
            color: #0066cc;
            text-decoration: none;
        }

        /* -----------------------
           System Logo
        ----------------------- */
        .logo {
            margin-top: 30px;
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
        }

        /* -----------------------
           Top-right corner header
        ----------------------- */
        .header {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>
    <!-- Top-right page header -->
    <div class="header">
        Use campus network account and password to login
    </div>

    <!-- Login container -->
    <div class="container">
        <!-- Welcome message -->
        <div class="welcome">Welcome, xxx</div>

        <!-- ID input field with placeholder -->
        <div class="form-group">
            <label for="id">ID</label>
            <input type="text" id="id" name="id" placeholder="Student/Staff ID">
        </div>

        <!-- Password input field with placeholder -->
        <div class="form-group">
            <label for="code">Password</label>
            <input type="password" id="code" name="code" placeholder="Campus network password">
        </div>

        <!-- Login button -->
        <button class="login-btn" onclick="login()">Login</button>

        <!-- Contact administrator -->
        <div class="contact-admin">
            <a href="#">Contact admin</a>
        </div>

        <!-- System Logo -->
        <div class="logo">(logo)</div>
    </div>

    <script>
        // -----------------------
        // Simulate login submission
        // -----------------------
        function login() {
            const id = document.getElementById('id').value;
            const code = document.getElementById('code').value;
            if (!id || !code) {
                alert('Please enter both ID and Password!');
                return;
            }
            // TODO: Replace with real backend authentication
            alert(`Submitted! ID: ${id}, Password: ${code}`);
        }
    </script>
</body>
</html>
