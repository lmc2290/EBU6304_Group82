<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>International School Teaching Assistant Recruitment System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-image: url('https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=modern%20international%20school%20campus%20background%20with%20professional%20education%20environment&image_size=landscape_16_9');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            width: 400px;
            text-align: center;
        }
        .welcome {
            font-size: 24px;
            margin-bottom: 30px;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .contact-admin {
            text-align: right;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .contact-admin a {
            color: #0066cc;
            text-decoration: none;
        }
        .logo {
            margin-top: 30px;
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
        }
        .header {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="header">
        Judging Mo/TA/Admin through ID
    </div>
    <div class="container">
        <div class="welcome">Welcome, xxx</div>
        <div class="form-group">
            <label for="id">ID</label>
            <input type="text" id="id" name="id">
        </div>
        <div class="form-group">
            <label for="code">Code</label>
            <input type="password" id="code" name="code">
        </div>
        <div class="contact-admin">
            <a href="#">Contact admin</a>
        </div>
        <div class="logo">
            (logo)
        </div>
    </div>
</body>
</html>
